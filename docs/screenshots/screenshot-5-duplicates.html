<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; }
.scene {
	width: 1920px; height: 1080px;
	background: linear-gradient(135deg, #0a0e1a 0%, #121830 30%, #0d1225 60%, #151a30 100%);
	position: relative;
}
/* Game environment */
.game-env {
	position: absolute; top: 0; left: 0; right: 0; bottom: 0;
}
.wall {
	position: absolute;
	background: rgba(255,255,255,0.015);
	border: 1px solid rgba(255,255,255,0.04);
}
.floor-line {
	position: absolute;
	background: rgba(255,255,255,0.03);
	height: 1px;
}
/* Perspective grid */
.grid-bg {
	position: absolute; top: 0; left: 0; right: 0; bottom: 0;
	background-image:
		linear-gradient(rgba(85,0,255,0.02) 1px, transparent 1px),
		linear-gradient(90deg, rgba(85,0,255,0.02) 1px, transparent 1px);
	background-size: 120px 120px;
}
/* Target zones */
.target-zone {
	position: absolute;
	border: 1px solid rgba(255,100,100,0.08);
	background: rgba(255,100,100,0.02);
	border-radius: 4px;
}
/* Crosshairs */
.crosshair {
	position: absolute;
	transform: translate(-50%, -50%);
	z-index: 10;
}
.crosshair svg {
	filter: drop-shadow(0 0 6px rgba(85,0,255,0.5));
}
.crosshair.primary svg {
	width: 60px; height: 60px;
	filter: drop-shadow(0 0 10px rgba(85,0,255,0.6));
}
.crosshair.shadow svg {
	width: 45px; height: 45px;
	opacity: 0.75;
}
/* Crosshair label */
.ch-label {
	position: absolute;
	top: 100%;
	left: 50%;
	transform: translateX(-50%);
	margin-top: 6px;
	font-size: 10px;
	color: rgba(85,0,255,0.5);
	white-space: nowrap;
	font-weight: 600;
}
/* Connection lines */
.connection-line {
	position: absolute;
	z-index: 5;
	border-top: 1px dashed rgba(85,0,255,0.15);
}
/* HUD */
.game-hud {
	position: absolute; top: 0; left: 0; right: 0; bottom: 0;
}
.minimap {
	position: absolute; bottom: 30px; left: 30px;
	width: 160px; height: 160px;
	border: 1px solid rgba(255,255,255,0.1);
	border-radius: 6px;
	background: rgba(0,0,0,0.4);
}
.minimap .ch-dot {
	position: absolute;
	width: 5px; height: 5px;
	background: #5500ff;
	border-radius: 50%;
}
.ammo-display {
	position: absolute; bottom: 30px; right: 30px;
	color: rgba(255,255,255,0.4);
	font-size: 28px; font-weight: 700;
}
.ammo-display span { font-size: 16px; color: rgba(255,255,255,0.2); }
/* Text overlay */
.text-overlay {
	position: absolute;
	bottom: 70px;
	left: 0; right: 0;
	text-align: center;
	z-index: 20;
}
.text-overlay h1 {
	font-size: 52px;
	font-weight: 800;
	color: #ffffff;
	text-shadow: 0 4px 30px rgba(0,0,0,0.8);
}
.text-overlay h1 span {
	background: linear-gradient(135deg, #7733ff, #5500ff);
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
}
/* App badge */
.app-badge {
	position: absolute; top: 40px; left: 40px;
	display: flex; align-items: center; gap: 14px; z-index: 20;
}
.app-badge .icon {
	width: 44px; height: 44px;
	background: linear-gradient(135deg, #ff8800, #ff3388);
	border-radius: 10px;
	display: flex; align-items: center; justify-content: center;
}
.app-badge .icon svg { width: 26px; height: 26px; }
.app-badge .name { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.9); }
/* Counter */
.counter {
	position: absolute; top: 40px; right: 40px;
	display: flex; align-items: center; gap: 12px; z-index: 20;
}
.counter .num {
	font-size: 48px; font-weight: 800;
	background: linear-gradient(135deg, #7733ff, #5500ff);
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
}
.counter .label {
	font-size: 14px; color: rgba(255,255,255,0.4);
	font-weight: 600;
	line-height: 1.3;
}
</style>
</head>
<body>
<div class="scene">
	<div class="grid-bg"></div>

	<div class="game-env">
		<div class="wall" style="left:100px;top:100px;width:250px;height:400px;"></div>
		<div class="wall" style="right:150px;top:80px;width:280px;height:450px;"></div>
		<div class="wall" style="left:450px;top:200px;width:180px;height:300px;"></div>
		<div class="wall" style="left:900px;top:150px;width:200px;height:350px;"></div>
		<div class="wall" style="right:550px;top:180px;width:160px;height:280px;"></div>
		<div class="floor-line" style="left:0;top:600px;width:100%;"></div>
		<div class="floor-line" style="left:0;top:650px;width:100%;"></div>

		<div class="target-zone" style="left:180px;top:250px;width:80px;height:120px;"></div>
		<div class="target-zone" style="left:520px;top:300px;width:70px;height:100px;"></div>
		<div class="target-zone" style="right:250px;top:220px;width:90px;height:130px;"></div>
	</div>

	<div class="game-hud">
		<div class="minimap">
			<div class="ch-dot" style="top:50%;left:50%;"></div>
			<div class="ch-dot" style="top:30%;left:35%;opacity:0.6;"></div>
			<div class="ch-dot" style="top:65%;left:70%;opacity:0.6;"></div>
			<div class="ch-dot" style="top:25%;left:65%;opacity:0.6;"></div>
			<div class="ch-dot" style="top:55%;left:25%;opacity:0.6;"></div>
			<div class="ch-dot" style="top:40%;left:80%;opacity:0.6;"></div>
			<div class="ch-dot" style="top:70%;left:45%;opacity:0.6;"></div>
		</div>
		<div class="ammo-display">30 <span>/ 120</span></div>
	</div>

	<!-- Primary crosshair (center) -->
	<div class="crosshair primary" style="top:45%;left:50%;">
		<svg viewBox="0 0 100 100">
			<circle cx="50" cy="50" r="20" fill="none" stroke="#5500ff" stroke-width="2.5"/>
			<line x1="50" y1="15" x2="50" y2="38" stroke="#5500ff" stroke-width="2.5"/>
			<line x1="50" y1="62" x2="50" y2="85" stroke="#5500ff" stroke-width="2.5"/>
			<line x1="15" y1="50" x2="38" y2="50" stroke="#5500ff" stroke-width="2.5"/>
			<line x1="62" y1="50" x2="85" y2="50" stroke="#5500ff" stroke-width="2.5"/>
			<circle cx="50" cy="50" r="3" fill="#5500ff"/>
		</svg>
		<div class="ch-label">Primary</div>
	</div>

	<!-- Shadow crosshairs -->
	<div class="crosshair shadow" style="top:32%;left:25%;">
		<svg viewBox="0 0 100 100">
			<circle cx="50" cy="50" r="20" fill="none" stroke="#7744ff" stroke-width="2"/>
			<line x1="50" y1="20" x2="50" y2="38" stroke="#7744ff" stroke-width="2"/>
			<line x1="50" y1="62" x2="50" y2="80" stroke="#7744ff" stroke-width="2"/>
			<line x1="20" y1="50" x2="38" y2="50" stroke="#7744ff" stroke-width="2"/>
			<line x1="62" y1="50" x2="80" y2="50" stroke="#7744ff" stroke-width="2"/>
			<circle cx="50" cy="50" r="2.5" fill="#7744ff"/>
		</svg>
	</div>
	<div class="crosshair shadow" style="top:28%;left:72%;">
		<svg viewBox="0 0 100 100">
			<circle cx="50" cy="50" r="20" fill="none" stroke="#7744ff" stroke-width="2"/>
			<line x1="50" y1="20" x2="50" y2="38" stroke="#7744ff" stroke-width="2"/>
			<line x1="50" y1="62" x2="50" y2="80" stroke="#7744ff" stroke-width="2"/>
			<line x1="20" y1="50" x2="38" y2="50" stroke="#7744ff" stroke-width="2"/>
			<line x1="62" y1="50" x2="80" y2="50" stroke="#7744ff" stroke-width="2"/>
			<circle cx="50" cy="50" r="2.5" fill="#7744ff"/>
		</svg>
	</div>
	<div class="crosshair shadow" style="top:55%;left:20%;">
		<svg viewBox="0 0 100 100">
			<circle cx="50" cy="50" r="20" fill="none" stroke="#7744ff" stroke-width="2"/>
			<line x1="50" y1="20" x2="50" y2="38" stroke="#7744ff" stroke-width="2"/>
			<line x1="50" y1="62" x2="50" y2="80" stroke="#7744ff" stroke-width="2"/>
			<line x1="20" y1="50" x2="38" y2="50" stroke="#7744ff" stroke-width="2"/>
			<line x1="62" y1="50" x2="80" y2="50" stroke="#7744ff" stroke-width="2"/>
			<circle cx="50" cy="50" r="2.5" fill="#7744ff"/>
		</svg>
	</div>
	<div class="crosshair shadow" style="top:60%;left:78%;">
		<svg viewBox="0 0 100 100">
			<circle cx="50" cy="50" r="20" fill="none" stroke="#7744ff" stroke-width="2"/>
			<line x1="50" y1="20" x2="50" y2="38" stroke="#7744ff" stroke-width="2"/>
			<line x1="50" y1="62" x2="50" y2="80" stroke="#7744ff" stroke-width="2"/>
			<line x1="20" y1="50" x2="38" y2="50" stroke="#7744ff" stroke-width="2"/>
			<line x1="62" y1="50" x2="80" y2="50" stroke="#7744ff" stroke-width="2"/>
			<circle cx="50" cy="50" r="2.5" fill="#7744ff"/>
		</svg>
	</div>
	<div class="crosshair shadow" style="top:38%;left:40%;">
		<svg viewBox="0 0 100 100">
			<circle cx="50" cy="50" r="20" fill="none" stroke="#7744ff" stroke-width="2"/>
			<line x1="50" y1="20" x2="50" y2="38" stroke="#7744ff" stroke-width="2"/>
			<line x1="50" y1="62" x2="50" y2="80" stroke="#7744ff" stroke-width="2"/>
			<line x1="20" y1="50" x2="38" y2="50" stroke="#7744ff" stroke-width="2"/>
			<line x1="62" y1="50" x2="80" y2="50" stroke="#7744ff" stroke-width="2"/>
			<circle cx="50" cy="50" r="2.5" fill="#7744ff"/>
		</svg>
	</div>
	<div class="crosshair shadow" style="top:50%;left:62%;">
		<svg viewBox="0 0 100 100">
			<circle cx="50" cy="50" r="20" fill="none" stroke="#7744ff" stroke-width="2"/>
			<line x1="50" y1="20" x2="50" y2="38" stroke="#7744ff" stroke-width="2"/>
			<line x1="50" y1="62" x2="50" y2="80" stroke="#7744ff" stroke-width="2"/>
			<line x1="20" y1="50" x2="38" y2="50" stroke="#7744ff" stroke-width="2"/>
			<line x1="62" y1="50" x2="80" y2="50" stroke="#7744ff" stroke-width="2"/>
			<circle cx="50" cy="50" r="2.5" fill="#7744ff"/>
		</svg>
	</div>

	<div class="app-badge">
		<div class="icon">
			<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="none" stroke="white" stroke-width="4"/><line x1="50" y1="10" x2="50" y2="35" stroke="white" stroke-width="4"/><line x1="50" y1="65" x2="50" y2="90" stroke="white" stroke-width="4"/><line x1="10" y1="50" x2="35" y2="50" stroke="white" stroke-width="4"/><line x1="65" y1="50" x2="90" y2="50" stroke="white" stroke-width="4"/></svg>
		</div>
		<div class="name">CrossOver</div>
	</div>

	<div class="counter">
		<div class="num">7</div>
		<div class="label">crosshairs<br>active</div>
	</div>

	<div class="text-overlay">
		<h1>Place <span>up to 14 crosshairs</span> on screen at once</h1>
	</div>
</div>
</body>
</html>
