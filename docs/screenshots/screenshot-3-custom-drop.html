<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', -apple-system, sans-serif; }
.scene {
	width: 1920px; height: 1080px;
	background: linear-gradient(160deg, #0c0f1a 0%, #141830 50%, #0a0d18 100%);
	position: relative;
	display: flex; align-items: center; justify-content: center;
}
/* CrossOver window */
.crossover-window {
	width: 220px; height: 220px;
	background: rgba(20, 22, 35, 0.85);
	border: 2px dashed #5500ff;
	border-radius: 16px;
	display: flex; align-items: center; justify-content: center;
	position: relative;
	box-shadow: 0 0 60px rgba(85,0,255,0.2), 0 20px 60px rgba(0,0,0,0.4);
	animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
	0%, 100% { border-color: #5500ff; box-shadow: 0 0 60px rgba(85,0,255,0.2); }
	50% { border-color: #7733ff; box-shadow: 0 0 80px rgba(85,0,255,0.35); }
}
.crossover-window .drop-text {
	color: rgba(255,255,255,0.4);
	font-size: 14px;
	text-align: center;
	line-height: 1.5;
}
.crossover-window .drop-icon {
	font-size: 32px;
	margin-bottom: 8px;
}
/* Dragged image */
.dragged-image {
	position: absolute;
	width: 120px; height: 120px;
	top: calc(50% - 130px);
	left: calc(50% + 40px);
	transform: rotate(-8deg);
	z-index: 15;
}
.dragged-image .img-card {
	width: 120px; height: 120px;
	background: #222;
	border-radius: 12px;
	box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
	display: flex; align-items: center; justify-content: center;
	overflow: hidden;
}
.dragged-image .img-card svg {
	width: 80px; height: 80px;
}
/* Drag trail */
.drag-trail {
	position: absolute;
	top: calc(50% - 160px);
	left: calc(50% + 160px);
	z-index: 10;
}
.drag-dot {
	width: 8px; height: 8px;
	border-radius: 50%;
	background: rgba(85,0,255,0.3);
	position: absolute;
}
/* Cursor */
.cursor {
	position: absolute;
	top: calc(50% - 100px);
	left: calc(50% + 80px);
	z-index: 20;
	width: 24px; height: 24px;
}
.cursor svg { width: 24px; height: 24px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
/* File explorer panel */
.file-panel {
	position: absolute;
	right: 180px; top: 50%;
	transform: translateY(-50%);
	width: 300px;
	background: #1a1d2e;
	border-radius: 12px;
	box-shadow: 0 20px 60px rgba(0,0,0,0.4);
	overflow: hidden;
	border: 1px solid rgba(255,255,255,0.06);
}
.file-panel-header {
	padding: 12px 16px;
	background: #12141f;
	color: rgba(255,255,255,0.5);
	font-size: 12px; font-weight: 600;
	border-bottom: 1px solid rgba(255,255,255,0.06);
}
.file-item {
	padding: 10px 16px;
	display: flex; align-items: center; gap: 10px;
	color: rgba(255,255,255,0.5);
	font-size: 13px;
	border-bottom: 1px solid rgba(255,255,255,0.03);
}
.file-item.dragging {
	background: rgba(85,0,255,0.1);
	color: #aa88ff;
	border-color: rgba(85,0,255,0.2);
}
.file-item .icon { font-size: 18px; }
/* Arrow indicator */
.arrow {
	position: absolute;
	top: 50%; left: calc(50% + 100px);
	transform: translateY(-50%);
	z-index: 5;
}
.arrow svg {
	width: 200px; height: 60px;
}
/* Before/After */
.before-after {
	position: absolute;
	left: 180px; top: 50%;
	transform: translateY(-50%);
	display: flex; flex-direction: column; gap: 20px;
	align-items: center;
}
.result-preview {
	width: 160px; height: 160px;
	background: rgba(20,22,35,0.6);
	border-radius: 12px;
	border: 1px solid rgba(255,255,255,0.08);
	display: flex; align-items: center; justify-content: center;
	position: relative;
}
.result-preview .label {
	position: absolute; top: -24px;
	color: rgba(255,255,255,0.3);
	font-size: 11px; font-weight: 600;
	text-transform: uppercase;
	letter-spacing: 1px;
}
.result-preview svg { width: 70px; height: 70px; }
/* Text overlay */
.text-overlay {
	position: absolute;
	bottom: 80px;
	left: 0; right: 0;
	text-align: center;
	z-index: 20;
}
.text-overlay h1 {
	font-size: 52px;
	font-weight: 800;
	color: #ffffff;
	text-shadow: 0 4px 30px rgba(0,0,0,0.8);
}
.text-overlay h1 span {
	background: linear-gradient(135deg, #7733ff, #5500ff);
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
}
/* App badge */
.app-badge {
	position: absolute; top: 40px; left: 40px;
	display: flex; align-items: center; gap: 14px; z-index: 20;
}
.app-badge .icon {
	width: 44px; height: 44px;
	background: linear-gradient(135deg, #ff8800, #ff3388);
	border-radius: 10px;
	display: flex; align-items: center; justify-content: center;
}
.app-badge .icon svg { width: 26px; height: 26px; }
.app-badge .name { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.9); }
</style>
</head>
<body>
<div class="scene">
	<div class="app-badge">
		<div class="icon">
			<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="30" fill="none" stroke="white" stroke-width="4"/><line x1="50" y1="10" x2="50" y2="35" stroke="white" stroke-width="4"/><line x1="50" y1="65" x2="50" y2="90" stroke="white" stroke-width="4"/><line x1="10" y1="50" x2="35" y2="50" stroke="white" stroke-width="4"/><line x1="65" y1="50" x2="90" y2="50" stroke="white" stroke-width="4"/></svg>
		</div>
		<div class="name">CrossOver</div>
	</div>

	<!-- CrossOver window with drop zone -->
	<div class="crossover-window">
		<div style="text-align:center;">
			<div class="drop-icon">📥</div>
			<div class="drop-text">Drop image<br>here</div>
		</div>
	</div>

	<!-- Dragged custom image -->
	<div class="dragged-image">
		<div class="img-card">
			<svg viewBox="0 0 100 100">
				<!-- Custom star crosshair -->
				<polygon points="50,5 61,35 95,35 68,57 79,90 50,70 21,90 32,57 5,35 39,35" fill="none" stroke="#ffaa00" stroke-width="2.5"/>
				<circle cx="50" cy="50" r="4" fill="#ffaa00"/>
			</svg>
		</div>
	</div>

	<!-- Drag trail dots -->
	<div class="drag-trail">
		<div class="drag-dot" style="top:0;left:0;opacity:0.15;width:6px;height:6px;"></div>
		<div class="drag-dot" style="top:20px;left:-30px;opacity:0.2;"></div>
		<div class="drag-dot" style="top:45px;left:-60px;opacity:0.3;"></div>
		<div class="drag-dot" style="top:65px;left:-100px;opacity:0.4;width:10px;height:10px;"></div>
	</div>

	<!-- Cursor -->
	<div class="cursor">
		<svg viewBox="0 0 24 24" fill="white"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
	</div>

	<!-- File explorer on the right -->
	<div class="file-panel">
		<div class="file-panel-header">📁 My Crosshairs</div>
		<div class="file-item"><span class="icon">🖼️</span> logo.png</div>
		<div class="file-item dragging"><span class="icon">⭐</span> star-reticle.png</div>
		<div class="file-item"><span class="icon">🖼️</span> diamond-scope.png</div>
		<div class="file-item"><span class="icon">🖼️</span> team-logo.png</div>
		<div class="file-item"><span class="icon">🖼️</span> minimal-dot.png</div>
	</div>

	<!-- Before/After result -->
	<div class="before-after">
		<div class="result-preview">
			<div class="label">Result</div>
			<svg viewBox="0 0 100 100">
				<polygon points="50,5 61,35 95,35 68,57 79,90 50,70 21,90 32,57 5,35 39,35" fill="none" stroke="#ffaa00" stroke-width="2.5"/>
				<circle cx="50" cy="50" r="4" fill="#ffaa00"/>
			</svg>
		</div>
	</div>

	<div class="text-overlay">
		<h1><span>Drag any image</span> to use as your crosshair</h1>
	</div>
</div>
</body>
</html>
