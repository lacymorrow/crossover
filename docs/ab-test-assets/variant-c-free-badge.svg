<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="crosshairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9500"/>
      <stop offset="50%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#ff00cc"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c853"/>
      <stop offset="100%" stop-color="#00e676"/>
    </linearGradient>
  </defs>

  <!-- Light background circle (matching current icon style) -->
  <circle cx="512" cy="512" r="480" fill="#f0f0f0"/>
  <circle cx="512" cy="512" r="468" fill="white"/>

  <!-- Outer crosshair ring -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="url(#crosshairGrad)" stroke-width="28"/>

  <!-- Inner crosshair ring -->
  <circle cx="512" cy="512" r="190" fill="none" stroke="url(#crosshairGrad)" stroke-width="22"/>

  <!-- Crosshair lines - vertical -->
  <line x1="512" y1="130" x2="512" y2="320" stroke="url(#crosshairGrad)" stroke-width="18" stroke-linecap="round"/>
  <line x1="512" y1="704" x2="512" y2="894" stroke="url(#crosshairGrad)" stroke-width="18" stroke-linecap="round"/>

  <!-- Crosshair lines - horizontal -->
  <line x1="130" y1="512" x2="320" y2="512" stroke="url(#crosshairGrad)" stroke-width="18" stroke-linecap="round"/>
  <line x1="704" y1="512" x2="894" y2="512" stroke="url(#crosshairGrad)" stroke-width="18" stroke-linecap="round"/>

  <!-- Running figure (simplified stick figure) -->
  <g fill="url(#crosshairGrad)">
    <!-- Head -->
    <circle cx="512" cy="430" r="30"/>
    <!-- Body -->
    <rect x="504" y="460" width="16" height="70" rx="8" fill="url(#crosshairGrad)"/>
    <!-- Arms -->
    <rect x="462" y="478" width="100" height="14" rx="7" fill="url(#crosshairGrad)" transform="rotate(-15 512 485)"/>
    <!-- Left leg -->
    <rect x="472" y="528" width="14" height="62" rx="7" fill="url(#crosshairGrad)" transform="rotate(20 479 528)"/>
    <!-- Right leg -->
    <rect x="538" y="528" width="14" height="58" rx="7" fill="url(#crosshairGrad)" transform="rotate(-25 545 528)"/>
  </g>

  <!-- FREE badge - bottom right corner -->
  <g>
    <!-- Badge shadow -->
    <rect x="674" y="738" width="270" height="108" rx="20" fill="#000" opacity="0.2"/>
    <!-- Badge background -->
    <rect x="670" y="734" width="270" height="108" rx="20" fill="url(#badgeGrad)"/>
    <!-- Badge border -->
    <rect x="670" y="734" width="270" height="108" rx="20" fill="none" stroke="white" stroke-width="4" opacity="0.6"/>
    <!-- F letter -->
    <g fill="white">
      <rect x="710" y="758" width="10" height="60"/>
      <rect x="710" y="758" width="40" height="10"/>
      <rect x="710" y="782" width="30" height="10"/>
    </g>
    <!-- R letter -->
    <g fill="white">
      <rect x="762" y="758" width="10" height="60"/>
      <rect x="762" y="758" width="35" height="10"/>
      <rect x="762" y="782" width="35" height="10"/>
      <rect x="787" y="758" width="10" height="34"/>
      <rect x="782" y="792" width="10" height="26" transform="rotate(-20 787 805)"/>
    </g>
    <!-- E letter -->
    <g fill="white">
      <rect x="816" y="758" width="10" height="60"/>
      <rect x="816" y="758" width="38" height="10"/>
      <rect x="816" y="782" width="30" height="10"/>
      <rect x="816" y="808" width="38" height="10"/>
    </g>
    <!-- E letter (2nd) -->
    <g fill="white">
      <rect x="866" y="758" width="10" height="60"/>
      <rect x="866" y="758" width="38" height="10"/>
      <rect x="866" y="782" width="30" height="10"/>
      <rect x="866" y="808" width="38" height="10"/>
    </g>
  </g>
</svg>
